<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090b0d" />
  <meta name="description" content="Intro animée de démarrage pour Cariste Runner." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
  <title>Cariste Runner — Intro</title>
  <style>
    :root {
      --bg: #050608;
      --orange: #ff9e18;
      --amber: #ffc23d;
      --white: #eef4f7;
      --panel: rgba(5, 7, 9, .74);
      --duration: 9200ms;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--white);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(174, 221, 255, .16), transparent 32%),
        radial-gradient(circle at 75% 60%, rgba(255, 149, 0, .12), transparent 28%),
        #030405;
      z-index: 0;
    }

    #intro {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      isolation: isolate;
      background: #000;
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
      background: #050608;
      box-shadow: 0 0 80px rgba(0, 0, 0, .8);
      transform: translateZ(0);
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translate3d(0, 0, 0) scale(1.02);
      will-change: transform, opacity, filter;
      user-select: none;
      pointer-events: none;
    }

    .scene.loading {
      opacity: 1;
      animation: loadingShot var(--duration) cubic-bezier(.16, .84, .36, 1) forwards;
    }

    .scene.lane {
      opacity: 0;
      filter: brightness(.72) contrast(1.08) saturate(1.02);
      transform: translate3d(0, 1.6%, 0) scale(1.065);
      animation: laneShot var(--duration) cubic-bezier(.16, .84, .32, 1) forwards;
    }

    .vignette,
    .scanlines,
    .flash,
    .speed,
    .blackout {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .vignette {
      background:
        radial-gradient(circle at 50% 48%, transparent 48%, rgba(0, 0, 0, .45) 78%, rgba(0, 0, 0, .9) 100%),
        linear-gradient(to bottom, rgba(0,0,0,.18), transparent 26%, transparent 68%, rgba(0,0,0,.32));
      mix-blend-mode: multiply;
    }

    .scanlines {
      opacity: .11;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.16) 0,
        rgba(255,255,255,.16) 1px,
        transparent 1px,
        transparent 5px
      );
      animation: scanDrift 2200ms linear infinite;
    }

    .flash {
      opacity: 0;
      background:
        radial-gradient(circle at 50% 10%, rgba(220, 245, 255, .92), transparent 23%),
        linear-gradient(100deg, transparent 0%, rgba(255, 177, 43, .02) 34%, rgba(255, 195, 64, .34) 50%, rgba(255, 177, 43, .02) 66%, transparent 100%);
      animation: neonFlash var(--duration) linear forwards;
      mix-blend-mode: screen;
    }

    .speed {
      opacity: 0;
      background:
        linear-gradient(100deg, transparent 0 43%, rgba(255, 154, 35, .5) 48%, transparent 54% 100%),
        repeating-linear-gradient(108deg, transparent 0 37px, rgba(255, 146, 20, .28) 38px, transparent 41px 84px);
      filter: blur(5px);
      transform: translateX(-34%) skewX(-12deg);
      animation: speedSwipe var(--duration) cubic-bezier(.2, .9, .2, 1) forwards;
      mix-blend-mode: screen;
    }

    .blackout {
      opacity: 0;
      background: #000;
      z-index: 30;
      animation: endBlack var(--duration) linear forwards;
    }

    .dust,
    .sparks {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 8;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      left: var(--x);
      top: var(--y);
      border-radius: 999px;
      background: rgba(255, 220, 140, .54);
      box-shadow: 0 0 8px rgba(255, 180, 57, .48);
      opacity: 0;
      animation: dustFloat var(--t) linear infinite;
      animation-delay: var(--d);
    }

    .spark {
      position: absolute;
      width: var(--w);
      height: 2px;
      left: var(--x);
      top: var(--y);
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #ffbb3e, #fff0b0, transparent);
      filter: blur(.3px);
      opacity: 0;
      transform: rotate(var(--r));
      animation: sparkFly var(--t) cubic-bezier(.18, .8, .3, 1) infinite;
      animation-delay: var(--d);
    }

    .hud-status {
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: min(82vw, 460px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 166, 38, .38);
      background: linear-gradient(180deg, rgba(10, 12, 14, .58), rgba(0, 0, 0, .34));
      box-shadow: 0 0 22px rgba(255, 147, 22, .13), inset 0 0 18px rgba(255, 147, 22, .08);
      backdrop-filter: blur(4px);
      clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
      opacity: 0;
      animation: statusReveal var(--duration) linear forwards;
    }

    .hud-status strong {
      color: var(--amber);
      letter-spacing: .13em;
      font-size: clamp(.66rem, 2vw, .78rem);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 166, 38, .5);
      white-space: nowrap;
    }

    .mini-bar {
      position: relative;
      flex: 1;
      height: 7px;
      min-width: 70px;
      border: 1px solid rgba(255, 177, 49, .34);
      background: rgba(255, 255, 255, .05);
      overflow: hidden;
      border-radius: 99px;
    }

    .mini-bar::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, #f59b20, #ffd45a, #fff0af);
      box-shadow: 0 0 15px rgba(255, 180, 45, .8);
      animation: barFill var(--duration) cubic-bezier(.15, .84, .25, 1) forwards;
    }

    .skip {
      position: fixed;
      z-index: 80;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      border: 1px solid rgba(255, 184, 61, .42);
      color: rgba(255, 225, 170, .92);
      background: rgba(0, 0, 0, .36);
      border-radius: 999px;
      padding: 9px 13px;
      font-weight: 800;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      backdrop-filter: blur(5px);
      cursor: pointer;
      opacity: .62;
      transition: opacity .2s ease, transform .2s ease, background .2s ease;
    }

    .skip:hover,
    .skip:focus-visible {
      opacity: 1;
      transform: translateY(-1px);
      background: rgba(255, 154, 25, .13);
      outline: none;
    }

    @keyframes loadingShot {
      0%   { opacity: 1; transform: scale(1.018) translateY(0); filter: brightness(.78) contrast(1.03); }
      10%  { filter: brightness(1.1) contrast(1.08); }
      32%  { opacity: 1; transform: scale(1.04) translateY(-.6%); filter: brightness(.94) contrast(1.08); }
      46%  { opacity: 1; transform: scale(1.055) translateY(-1.1%); filter: brightness(.82) contrast(1.12); }
      53%  { opacity: 0; transform: scale(1.075) translateY(-1.7%); filter: brightness(.35) contrast(1.16); }
      100% { opacity: 0; transform: scale(1.075) translateY(-1.7%); }
    }

    @keyframes laneShot {
      0%, 38% { opacity: 0; transform: translateY(1.8%) scale(1.08); filter: brightness(.38) contrast(1.08); }
      48%     { opacity: 1; transform: translateY(.9%) scale(1.058); filter: brightness(.9) contrast(1.12); }
      72%     { opacity: 1; transform: translateY(-.2%) scale(1.035); filter: brightness(1.02) contrast(1.1) saturate(1.04); }
      90%     { opacity: 1; transform: translateY(-.85%) scale(1.015); filter: brightness(.92) contrast(1.12); }
      100%    { opacity: 1; transform: translateY(-.85%) scale(1.015); filter: brightness(.62) contrast(1.12); }
    }

    @keyframes neonFlash {
      0%, 4%   { opacity: 0; }
      5%       { opacity: .56; }
      6%       { opacity: .06; }
      7%       { opacity: .48; }
      8%, 40%  { opacity: .03; }
      45%      { opacity: .3; }
      47%      { opacity: 0; }
      51%      { opacity: .5; }
      55%, 100%{ opacity: 0; }
    }

    @keyframes speedSwipe {
      0%, 52%  { opacity: 0; transform: translateX(-42%) skewX(-12deg); }
      60%      { opacity: .5; }
      72%      { opacity: .18; transform: translateX(35%) skewX(-12deg); }
      86%,100% { opacity: 0; transform: translateX(60%) skewX(-12deg); }
    }

    @keyframes endBlack {
      0%, 86% { opacity: 0; }
      100%    { opacity: 1; }
    }

    @keyframes scanDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(10px); }
    }

    @keyframes dustFloat {
      0%   { opacity: 0; transform: translate3d(0, 20px, 0) scale(.5); }
      25%  { opacity: .6; }
      80%  { opacity: .24; }
      100% { opacity: 0; transform: translate3d(var(--dx), -120px, 0) scale(1.25); }
    }

    @keyframes sparkFly {
      0%, 50% { opacity: 0; transform: translateX(-30px) rotate(var(--r)); }
      58%     { opacity: .75; }
      78%     { opacity: .08; }
      100%    { opacity: 0; transform: translateX(180px) rotate(var(--r)); }
    }

    @keyframes statusReveal {
      0%, 8%   { opacity: 0; transform: translateX(-50%) translateY(14px); }
      12%, 78% { opacity: .9; transform: translateX(-50%) translateY(0); }
      86%,100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    }

    @keyframes barFill {
      0%   { width: 6%; }
      18%  { width: 22%; }
      39%  { width: 48%; }
      56%  { width: 68%; }
      76%  { width: 88%; }
      100% { width: 100%; }
    }

    @media (orientation: landscape) {
      .stage {
        width: min(100vw, 480px);
        height: min(100vh, 853px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scene,
      .flash,
      .speed,
      .blackout,
      .scanlines,
      .particle,
      .spark,
      .hud-status,
      .mini-bar::before {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  

    /* Commande d'introduction : icône seule, sans forme de bouton. */
    .skip{
      width:48px!important;
      height:48px!important;
      min-width:48px!important;
      min-height:48px!important;
      padding:0!important;
      border:0!important;
      border-radius:0!important;
      background:transparent!important;
      box-shadow:none!important;
      backdrop-filter:none!important;
      font-size:28px!important;
      line-height:1!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      opacity:.72!important;
      -webkit-tap-highlight-color:transparent;
    }
    .skip:hover,.skip:focus-visible{background:transparent!important;opacity:1!important;filter:drop-shadow(0 4px 7px rgba(0,0,0,.6));}
    .skip:active{transform:scale(.86)!important;}

</style>
</head>
<body>
  <main id="intro" aria-label="Animation de démarrage Cariste Runner">
    <section class="stage" id="stage">
      <picture>
        <source srcset="assets/img/loading.webp" type="image/webp" />
        <img class="scene loading" src="assets/img/loading.jpg" alt="Cariste Runner — chargement" draggable="false" />
      </picture>
      <picture>
        <source srcset="assets/img/lane.webp" type="image/webp" />
        <img class="scene lane" src="assets/img/lane.jpg" alt="Cariste Runner — voie en construction" draggable="false" />
      </picture>

      <div class="flash"></div>
      <div class="speed"></div>
      <div class="dust" id="dust"></div>
      <div class="sparks" id="sparks"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="hud-status" aria-hidden="true">
        <strong>Ouverture du shift</strong>
        <span class="mini-bar"></span>
      </div>
      <div class="blackout"></div>
    </section>
  </main>

  <button class="skip" id="skip" type="button" aria-label="Passer l’introduction" title="Passer l’introduction">⏭️</button>

  <script>
    "use strict";

    const NEXT_PAGE = "./accueil.html";
    const INTRO_DURATION = 9400;
    const SAFETY_DURATION = 11200;

    let hasNavigated = false;

    function goHome(reason = "timer") {
      if (hasNavigated) return;
      hasNavigated = true;

      try {
        sessionStorage.setItem("cariste_intro_done", "1");
      } catch (e) {}

      const target = new URL(NEXT_PAGE, window.location.href);
      target.searchParams.set("from", "intro");
      target.searchParams.set("v", "3-5-9");
      target.searchParams.set("reason", reason);
      window.location.assign(target.href);
    }

    // Sécurité spéciale PWA installée : même si une animation/image se bloque,
    // le lancement bascule quand même vers l'accueil.
    const mainTimer = window.setTimeout(() => goHome("timer"), INTRO_DURATION);
    const safetyTimer = window.setTimeout(() => goHome("safety"), SAFETY_DURATION);

    function safeAppendParticles(containerId, className, count, setup) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const el = document.createElement("i");
        el.className = className;
        setup(el);
        frag.appendChild(el);
      }
      container.appendChild(frag);
    }

    function addParticles() {
      safeAppendParticles("dust", "particle", 72, (p) => {
        p.style.setProperty("--x", `${Math.random() * 100}%`);
        p.style.setProperty("--y", `${20 + Math.random() * 78}%`);
        p.style.setProperty("--dx", `${-30 + Math.random() * 60}px`);
        p.style.setProperty("--t", `${4500 + Math.random() * 7000}ms`);
        p.style.setProperty("--d", `${-Math.random() * 8000}ms`);
      });

      safeAppendParticles("sparks", "spark", 22, (s) => {
        s.style.setProperty("--x", `${2 + Math.random() * 96}%`);
        s.style.setProperty("--y", `${30 + Math.random() * 56}%`);
        s.style.setProperty("--w", `${24 + Math.random() * 68}px`);
        s.style.setProperty("--r", `${-24 + Math.random() * 48}deg`);
        s.style.setProperty("--t", `${2600 + Math.random() * 3600}ms`);
        s.style.setProperty("--d", `${2400 + Math.random() * 5200}ms`);
      });
    }

    window.addEventListener("error", (event) => {
      console.warn("[Cariste Runner] Erreur intro :", event.message || event.error);
      window.setTimeout(() => goHome("error"), 700);
    });

    window.addEventListener("unhandledrejection", (event) => {
      console.warn("[Cariste Runner] Promesse intro rejetée :", event.reason);
      window.setTimeout(() => goHome("promise"), 700);
    });

    window.addEventListener("DOMContentLoaded", () => {
      addParticles();

      const skip = document.getElementById("skip");
      if (skip) {
        skip.addEventListener("click", () => {
          window.clearTimeout(mainTimer);
          window.clearTimeout(safetyTimer);
          goHome("skip");
        });
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        window.clearTimeout(mainTimer);
        window.clearTimeout(safetyTimer);
        goHome("keyboard");
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register("./service-worker.js", { scope: "./" });
          if (registration.waiting) registration.waiting.postMessage({ type: "SKIP_WAITING" });
        } catch (error) {
          console.warn("[Cariste Runner] Service worker non enregistré :", error);
        }
      });
    }
  </script>
</body>
</html>
